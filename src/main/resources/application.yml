spring:
  application:
    name: igc-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mongodb:
    uri: ${MONGODB_URI}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}

server:
  port: 8080

blockchain:
  rpc-url: ${BLOCKCHAIN_RPC_URL}
  chain-id: 1337
  contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS}
  admin-private-key: ${BLOCKCHAIN_ADMIN_PRIVATE_KEY}
  issuer-name: "IUH"

# Digital Signature Configuration
signature:
  keystore-path: classpath:keystore/certificate.p12
  keystore-password: ${SIGNATURE_KEYSTORE_PASSWORD}
  key-alias: ${SIGNATURE_KEY_ALIAS}
  reason: "Certificate Issued by University"
  location: "Vietnam"

# Certificate PDF Template
certificate:
  template:
    logo-path: classpath:templates/logo.png
    background-color: "#1a237e"
    primary-color: "#3f51b5"
    secondary-color: "#757de8"

security:
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS}
  web3:
    x-header-secret: ${X_HEADER_SECRET}
  jwt:
    secret: ${SECURITY_JWT_SECRET}
    access-token-expiration: "300"
    refresh-token-expiration: "86400"
  cookie:
    same-site: "None"
    secure: "true"
    refresh-token-name: "refresh_token"

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: ${AWS_BUCKET_NAME}
    domain: ${AWS_DOMAIN}
    region: ${AWS_REGION}

logging:
  level:
    root: INFO
    com.certificate.blockchain: DEBUG
    org.web3j: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.springframework.jdbc.core: OFF

springdoc:
  api-docs:
    enabled: false
    version: openapi_3_0
  swagger-ui:
    enabled: false
